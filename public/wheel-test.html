<!doctype html>
<html><head><style>
body { background:#020817; color:#f1f5f9; font-family:sans-serif; padding:40px; }
.no-scrollbar { scrollbar-width: none; -ms-overflow-style: none; }
.no-scrollbar::-webkit-scrollbar { display: none; }
</style></head>
<body>
<div id="out" style="margin-bottom:12px;font-size:20px;">value: <span id="val">-</span></div>
<div id="root"></div>
<script>
const WHEEL_ITEM_H = 36;
const WHEEL_MAX = 30;
const root = document.getElementById('root');
const wrap = document.createElement('div');
wrap.style.cssText = `position:relative;width:64px;height:${WHEEL_ITEM_H*3}px;`;
const scroller = document.createElement('div');
scroller.className = 'no-scrollbar';
scroller.style.cssText = `height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;`;
scroller.innerHTML = `<div style="height:${WHEEL_ITEM_H}px"></div>` +
  Array.from({length: WHEEL_MAX+1}).map((_,i)=>`<div style="height:${WHEEL_ITEM_H}px;scroll-snap-align:center;display:flex;align-items:center;justify-content:center;font-weight:bold;">${i}</div>`).join('') +
  `<div style="height:${WHEEL_ITEM_H}px"></div>`;
wrap.appendChild(scroller);
const overlay = document.createElement('div');
overlay.style.cssText = `position:absolute;inset-inline:0;top:50%;transform:translateY(-50%);height:${WHEEL_ITEM_H}px;border-top:1px solid rgba(16,185,129,0.4);border-bottom:1px solid rgba(16,185,129,0.4);pointer-events:none;border-radius:8px;`;
wrap.appendChild(overlay);
root.appendChild(wrap);

scroller.addEventListener('scroll', () => {
  const idx = Math.round(scroller.scrollTop / WHEEL_ITEM_H);
  const clamped = Math.max(0, Math.min(WHEEL_MAX, idx));
  document.getElementById('val').textContent = clamped;
});
// initial sync test: simulate external reset to value=21
window.testSetTo21 = () => { scroller.scrollTop = 21 * WHEEL_ITEM_H; };
</script>
<button onclick="testSetTo21()" style="margin-top:20px;padding:8px 16px;">jump to 21 (simulate external reset)</button>
</body></html>
